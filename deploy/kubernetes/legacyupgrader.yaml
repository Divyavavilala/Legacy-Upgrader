apiVersion: v1
kind: Namespace
metadata:
  name: legacyupgrader
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: legacyupgrader-config
  namespace: legacyupgrader
data:
  NODE_ENV: production
  API_ONLY: 'true'
  LOG_FORMAT: json
  METRICS_ENABLED: 'true'
  PORT: '3000'
  WORKER_HEALTH_PORT: '3001'
  REDIS_HOST: redis
  REDIS_PORT: '6379'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacyupgrader-api
  namespace: legacyupgrader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacyupgrader-api
  template:
    metadata:
      labels:
        app: legacyupgrader-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/legacyupgrader-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: legacyupgrader-config
            - secretRef:
                name: legacyupgrader-secrets
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacyupgrader-worker
  namespace: legacyupgrader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacyupgrader-worker
  template:
    metadata:
      labels:
        app: legacyupgrader-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/legacyupgrader-api:latest
          command: ['node', 'dist/worker.main.js']
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: legacyupgrader-config
            - secretRef:
                name: legacyupgrader-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3001
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: legacyupgrader-api
  namespace: legacyupgrader
spec:
  selector:
    app: legacyupgrader-api
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legacyupgrader
  namespace: legacyupgrader
spec:
  rules:
    - host: api.legacyupgrader.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: legacyupgrader-api
                port:
                  number: 80

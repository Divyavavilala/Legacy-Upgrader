# Production stack — API, workers, web, Postgres, Redis, Prometheus, Grafana
# Usage: cp .env.production.example .env.production && docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legacyupgrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-legacyupgrader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-legacyupgrader} -d ${POSTGRES_DB:-legacyupgrader}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [legacyupgrader]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [legacyupgrader]

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: 'no'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUN_MIGRATIONS: 'true'
    command: ['node', '-e', "console.log('migrate ok')"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [legacyupgrader]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment: &api-env
      NODE_ENV: production
      API_ONLY: 'true'
      LOG_FORMAT: json
      METRICS_ENABLED: 'true'
      TRUST_PROXY: 'true'
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      APP_NAME: LegacyUpgrader API
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_REFRESH_PEPPER: ${JWT_REFRESH_PEPPER:?Set JWT_REFRESH_PEPPER}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      API_KEY_RATE_LIMIT_PER_MINUTE: ${API_KEY_RATE_LIMIT_PER_MINUTE:-60}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_AUTO_RUN_AFTER_SCAN: ${AI_AUTO_RUN_AFTER_SCAN:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health/ready',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200&&d.includes('\\\"ok\\\"')?0:1))}).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [legacyupgrader]

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-env
      WORKER_HEALTH_PORT: 3001
    command: ['node', 'dist/worker.main.js']
    ports:
      - '${WORKER_HEALTH_PORT:-3001}:3001'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:3001/api/health/ready',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
    networks: [legacyupgrader]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_NAME: LegacyUpgrader
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [legacyupgrader]

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    depends_on:
      api:
        condition: service_healthy
    networks: [legacyupgrader]

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '${GRAFANA_PORT:-3002}:3000'
    depends_on:
      - prometheus
    networks: [legacyupgrader]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  legacyupgrader:
    driver: bridge
